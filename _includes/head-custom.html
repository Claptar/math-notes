<style>
  .book-sidebar {
    box-sizing: border-box;
    position: fixed;
    top: 0;
    left: 0;
    width: 220px;
    height: 100vh;
    padding: 28px 22px;
    overflow-y: auto;
    border-right: 1px solid #e5e7eb;
    background: #ffffff;
  }

  .book-sidebar__title {
    display: block;
    margin-bottom: 18px;
    color: #111827;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    text-decoration: none;
  }

  .book-sidebar__section {
    margin: 20px 0 8px;
    color: #6b7280;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .book-sidebar__link {
    display: block;
    margin: 2px 0;
    padding: 7px 9px;
    border-radius: 6px;
    color: #374151;
    line-height: 1.35;
    text-decoration: none;
  }

  .book-sidebar__link:hover,
  .book-sidebar__link.is-active {
    background: #f3f4f6;
    color: #111827;
  }

  .book-sidebar__link.is-active {
    font-weight: 700;
  }

  .book-sidebar__back {
    display: block;
    margin-bottom: 16px;
    padding: 5px 9px;
    color: #6b7280;
    font-size: 0.88em;
    text-decoration: none;
    border-radius: 6px;
  }

  .book-sidebar__back:hover {
    color: #111827;
    background: #f3f4f6;
  }

  @media (min-width: 1180px) {
    body {
      padding-left: 220px;
    }

    body.book-inner-page .wrapper {
      box-sizing: border-box;
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 48px;
    }

    body.book-inner-page header,
    body.book-inner-page footer,
    body.book-inner-page aside {
      display: none;
    }

    body.book-inner-page section {
      float: none;
      width: auto;
      max-width: none;
      border: 0;
      padding: 0;
    }
  }

  @media (max-width: 1179px) {
    .book-sidebar {
      display: none;
    }
  }

  .chapter-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 3em;
    padding-top: 1.2em;
    border-top: 1px solid #e5e7eb;
    gap: 1em;
  }

  .chapter-nav__prev a,
  .chapter-nav__next a {
    color: #374151;
    text-decoration: none;
    font-size: 0.95em;
  }

  .chapter-nav__prev a:hover,
  .chapter-nav__next a:hover {
    color: #111827;
    text-decoration: underline;
  }

  .chapter-nav__next {
    text-align: right;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const currentPath = window.location.pathname.replace(/\/$/, "/index.html");

    document.body.classList.add("book-inner-page");

    const sidebarType = "{{ page.sidebar | default: 'topics' }}";

    const sidebars = {
      topics: {
        title: "{{ site.title | default: 'Math Notes' }}",
        titleHref: "{{ '/' | relative_url }}",
        links: [
          { section: "Topics" },
          { label: "Algebra", href: "{{ '/algebra.html' | relative_url }}" },
          { label: "Probability Theory", href: "{{ '/probability.html' | relative_url }}" },
          { label: "Linear Algebra", href: "{{ '/linear_algebra.html' | relative_url }}" }
        ]
      },
      algebra: {
        title: "Algebra",
        titleHref: "{{ '/algebra.html' | relative_url }}",
        back: { label: "← All Topics", href: "{{ '/' | relative_url }}" },
        links: [
          { section: "Chapters" },
          { label: "1. Binary Operations and Associativity", href: "{{ '/notes/algebra/01-binary-operations-and-associativity.html' | relative_url }}" },
          { label: "2. Semigroups and Monoids", href: "{{ '/notes/algebra/02-semigroups-and-monoids.html' | relative_url }}" },
          { label: "3. Groups and Reversibility", href: "{{ '/notes/algebra/03-groups-and-reversibility.html' | relative_url }}" },
          { label: "4. Symmetries and Groups", href: "{{ '/notes/algebra/04-symmetries-and-groups.html' | relative_url }}" },
          { label: "5. Commutativity and Abelian Groups", href: "{{ '/notes/algebra/05-commutativity-and-abelian-groups.html' | relative_url }}" },
          { label: "6. Rings and Distributivity", href: "{{ '/notes/algebra/06-rings-and-distributivity.html' | relative_url }}" },
          { label: "7. Fields and Scalar Arithmetic", href: "{{ '/notes/algebra/07-fields-and-scalars.html' | relative_url }}" },
          { label: "8. Vector Spaces", href: "{{ '/notes/algebra/08-vector-spaces.html' | relative_url }}" },
          { label: "9. Algebras over Fields", href: "{{ '/notes/algebra/09-algebras-over-fields.html' | relative_url }}" },
          { label: "11. One-Page Map of the Structures", href: "{{ '/notes/algebra/11-map-of-structures.html' | relative_url }}" }
        ]
      },
      probability: {
        title: "Probability Theory",
        titleHref: "{{ '/probability.html' | relative_url }}",
        back: { label: "← All Topics", href: "{{ '/' | relative_url }}" },
        links: [
          { section: "Notes" },
          { label: "Sigma-Algebras", href: "{{ '/notes/probability/10-sigma-algebras.html' | relative_url }}" },
          { label: "Gaussian Vectors, Coordinate Random Variables, and Covariance Geometry", href: "{{ '/notes/probability/gaussian-vectors-covariance-geometry.html' | relative_url }}" }
        ]
      },
      linear_algebra: {
        title: "Linear Algebra",
        titleHref: "{{ '/linear_algebra.html' | relative_url }}",
        back: { label: "← All Topics", href: "{{ '/' | relative_url }}" },
        links: [
          { section: "Notes" },
          { label: "1. Linear Span, Basis, and Coordinates", href: "{{ '/notes/linear_algebra/basis_coordinates.html' | relative_url }}" },
          { label: "2. Isomorphism of Vector Spaces", href: "{{ '/notes/linear_algebra/isomorphism.html' | relative_url }}" },
          { label: "3. Change of Basis", href: "{{ '/notes/linear_algebra/changeofbasis.html' | relative_url }}" },
          { label: "4. Linear Subspaces", href: "{{ '/notes/linear_algebra/linear_subspaces.html' | relative_url }}" },
          { label: "5. Quotient Spaces", href: "{{ '/notes/linear_algebra/quotient_spaces.html' | relative_url }}" },
          { label: "6. Direct Sums, Complements, and Decompositions", href: "{{ '/notes/linear_algebra/direct_sums_and_complements.html' | relative_url }}" }
        ]
      }
    };

    const config = sidebars[sidebarType] || sidebars.topics;

    const sidebar = document.createElement("nav");
    sidebar.className = "book-sidebar";
    sidebar.setAttribute("aria-label", "Book sections");

    const titleEl = document.createElement("a");
    titleEl.className = "book-sidebar__title";
    titleEl.href = config.titleHref;
    titleEl.textContent = config.title;
    sidebar.appendChild(titleEl);

    if (config.back) {
      const back = document.createElement("a");
      back.className = "book-sidebar__back";
      back.href = config.back.href;
      back.textContent = config.back.label;
      sidebar.appendChild(back);
    }

    config.links.forEach(function (item) {
      if (item.section) {
        const section = document.createElement("div");
        section.className = "book-sidebar__section";
        section.textContent = item.section;
        sidebar.appendChild(section);
        return;
      }

      const link = document.createElement("a");
      const linkPath = new URL(item.href, window.location.origin).pathname.replace(/\/$/, "/index.html");
      link.className = "book-sidebar__link";
      link.href = item.href;
      link.textContent = item.label;

      if (linkPath === currentPath) {
        link.classList.add("is-active");
        link.setAttribute("aria-current", "page");
      }

      sidebar.appendChild(link);
    });

    document.body.prepend(sidebar);
  });
</script>
